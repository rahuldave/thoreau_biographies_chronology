":5,"value":1860.9262295081967},"end":{"year":1860,"month":12,"day":5,"value":1860.9262295081967},"confidence":"month"},{"id":"crisis-1858-1862-37","chronologyId":"crisis-1858-1862","dateLabel":"December 3, 1860","title":"Thoreau develops the cold or bronchitis that begins his final decline.","summary":"Fuller links the illness to his wet fieldwork and to the end of his Darwinian seed project.","details":["Lane: Thoreau seeds and death.","Evidence: The date is crucial because the intellectual story is cut short by the body. Thoreau is still counting, classifying, and thinking in Darwinian historical time when illness begins closing the time available to finish the work.","Book anchor: Chapter 24: In the Transcendental Graveyard (book.md:1757-1761) gives the December 3 cold and the bronchitis/tuberculosis decline.","Web context: Thoreau's biography corroborates the bronchitis after counting tree rings and his decline toward death; Alcott's biography notes the illness link in local memory."],"bookAnchors":[{"href":"https://closereading.rahuldave.us/books/125/chapters/6985#cell-17","display":"Chapter 24: In the Transcendental Graveyard, b0018-b0020 (book.md:1757-1761)","description":"Chapter 24: In the Transcendental Graveyard b0018-b0020; 24_in_the_transcendental_graveyard/b0018","lineStart":1757,"lineEnd":1761,"cellStart":17,"cellEnd":19,"chapterId":6985,"kind":"book-cell"}],"check":"web-confirmed context; Fuller supplies date and scene","sources":"Book: F24. Web: W-Thoreau, W-AmosBronsonAlcott.","start":{"year":1860,"month":12,"day":3,"value":1860.9207650273224},"end":{"year":1860,"month":12,"day":3,"value":1860.9207650273224},"confidence":"exact"},{"id":"crisis-1858-1862-38","chronologyId":"crisis-1858-1862","dateLabel":"December 15, 1860","title":"Thoreau lectures in Waterbury despite illness.","summary":"Fuller reads the trip as part of the physical cost of Thoreau's final public work.","details":["Lane: Thoreau seeds and death.","Evidence: This event keeps Thoreau from becoming merely passive in the final arc. He is sick but still trying to speak, travel, and continue the work of making his observations public.","Book anchor: Chapter 24: In the Transcendental Graveyard (book.md:1757-1760) places the Waterbury lecture inside the bronchitis episode.","Web context: Thoreau sources corroborate his 1860 illness and late revision/publication work; Fuller supplies the Waterbury detail."],"bookAnchors":[{"href":"https://closereading.rahuldave.us/books/125/chapters/6985#cell-17","display":"Chapter 24: In the Transcendental Graveyard, b0018-b0019 (book.md:1757-1760)","description":"Chapter 24: In the Transcendental Graveyard b0018-b0019; 24_in_the_transcendental_graveyard/b0018","lineStart":1757,"lineEnd":1760,"cellStart":17,"cellEnd":18,"chapterId":6985,"kind":"book-cell"}],"check":"web-confirmed context; Fuller supplies exact lecture trip","sources":"Book: F24. Web: W-Thoreau.","start":{"year":1860,"month":12,"day":15,"value":1860.9535519125684},"end":{"year":1860,"month":12,"day":15,"value":1860.9535519125684},"confidence":"exact"},{"id":"crisis-1858-1862-39","chronologyId":"crisis-1858-1862","dateLabel":"December 20, 1860","title":"South Carolina secedes.","summary":"Fuller closes the 1860 sequence with Thoreau's illness and the Union's formal rupture.","details":["Lane: National crisis.","Evidence: Secession makes the metaphor of succession/secession unavoidable. As Thoreau is thinking about forest succession, the nation enters a political secession that will turn Brown's ghost into war.","Book anchor: Chapter 24: In the Transcendental Graveyard (book.md:1757-1760) places secession alongside Thoreau's illness.","Web context: South Carolina secession and election sources corroborate the date and national context."],"bookAnchors":[{"href":"https://closereading.rahuldave.us/books/125/chapters/6985#cell-17","display":"Chapter 24: In the Transcendental Graveyard, b0018-b0019 (book.md:1757-1760)","description":"Chapter 24: In the Tra ed recovery.","Web context: Thoreau sources corroborate his 1861 western travel and continuing health decline."],"bookAnchors":[{"href":"https://closereading.rahuldave.us/books/125/chapters/6985#cell-19","display":"Chapter 24: In the Transcendental Graveyard, b0020-b0021 (book.md:1761-1764)","description":"Chapter 24: In the Transcendental Graveyard b0020-b0021; 24_in_the_transcendental_graveyard/b0020","lineStart":1761,"lineEnd":1764,"cellStart":19,"cellEnd":20,"chapterId":6985,"kind":"book-cell"}],"check":"web-confirmed context; Fuller supplies health motive","sources":"Book: F24. Web: W-Thoreau.","start":{"year":1861,"month":7,"day":15,"value":1861.5342465753424},"end":{"year":1861,"month":7,"day":15,"value":1861.5342465753424},"confidence":"season"},{"id":"crisis-1858-1862-43","chronologyId":"crisis-1858-1862","dateLabel":"March 1862","title":"Thoreau knows he has only months to live and arranges his papers.","summary":"Fuller frames the paper-sorting as the last ordering of a life and a project interrupted by death.","details":["Lane: Thoreau seeds and death.","Evidence: This event belongs in the zoom because it is where the unfinished seed, forest, and natural-history work becomes archival. Sophia Thoreau and Elizabeth Hoar are helping because Henry can no longer do the mechanical labor himself.","Book anchor: Chapter 24: In the Transcendental Graveyard (book.md:1763-1767) gives the March 1862 letter, Staples visit, and paper arrangement.","Web context: Thoreau sources corroborate his final illness, last editing, and May 1862 death."],"bookAnchors":[{"href":"https://closereading.rahuldave.us/books/125/chapters/6985#cell-20","display":"Chapter 24: In the Transcendental Graveyard, b0021-b0023 (book.md:1763-1767)","description":"Chapter 24: In the Transcendental Graveyard b0021-b0023; 24_in_the_transcendental_graveyard/b0021","lineStart":1763,"lineEnd":1767,"cellStart":20,"cellEnd":22,"chapterId":6985,"kind":"book-cell"}],"check":"web-confirmed context; Fuller su ","dateLabel":"February 12, 1809","title":"Charles Darwin is born in Shrewsbury, England.","summary":"","details":["Evidence: Darwin's birth anchors the scientific life behind Origin, but the main chronology only needs it as a starting point for Fuller's prehistory of the theory. Fuller introduces Darwin through the habits that later matter: collecting, patient comparison, and reluctance to publish before the evidence is overwhelming.","Book anchor: Chapter 3: Beetles, Birds, Theories places Darwin's formation behind the shock Americans feel in 1859-1860.","Web context: Wikipedia's Darwin biography supplies the public life dates and identifies natural selection as Darwin's central scientific contribution."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Darwin.","start":{"year":1809,"month":2,"day":12,"value":1809.1150684931506},"end":{"year":1809,"month":2,"day":12,"value":1809.1150684931506},"confidence":"exact"},{"id":"darwin-2","chronologyId":"darwin","dateLabel":"1825-1827","title":"Darwin studies medicine at Edinburgh, then moves toward Cambridge and natural history.","summary":"","details":["Evidence: Fuller treats these years as a turn away from conventional professional training and toward natural-history practice. The shift helps explain why Origin arrives as an evidentiary argument built from specimens, field observation, and correspondence.","Book anchor: Chapter 3 uses this educational detour to set up Darwin's later authority as an observer.","Web context: The Darwin biography corroborates Edinburgh and Cambridge as the institutional background to his natural-history career."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for interpretive placement","sources":"Sources: F3; W-Darwin.","start":{"year":1825,"month":1,"day":1,"value":1825},"end":{"year":1827,"month":12,"day":31,"value":1827.9972602739726},"confidence":"range"},{"id":"darwin-3","chronologyId":"darwin","dateLabel":"December 27, 1831-October 2, 1836","title":"Darwin sails on HMS Beagle and returns with evidence that species may not be fixed.","summary":"","details":["Evidence: The Beagle voyage is the field base for the theory Fuller follows into America. Geographic distribution, fossils, and island variation become the observations that later make Origin persuasive to readers already aware of Darwin as a travel writer and naturalist.","Book anchor: Chapters 3, 6, and 7 use the Beagle background to connect Darwin's theory to Gray, Brace, and Thoreau's reading.","Web context: Darwin and Origin summaries identify the voyage as the empirical seedbed for his later evolutionary argument."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for thematic importance","sources":"Sources: F3, F6, F7; W-Darwin, W-Origin.","start":{"year":1831,"month":12,"day":27,"value":1831.986301369863},"end":{"year":1836,"month":10,"day":2,"value":1836.7513661202186},"confidence":"range"},{"id":"darwin-4","chronologyId":"darwin","dateLabel":"1837","title":"Darwin begins systematic notebooks on species transmutation.","summary":"","details":["Evidence: The notebooks mark the point where Darwin's observations become an explicit inquiry into species change. Fuller uses this long private development to distinguish Origin from sudden speculation.","Book anchor: Chapter 3 uses the notebooks to show how long Darwin withheld and refined his argument.","Web context: The Origin page notes Darwin's early notes and sketches as part of the delay between conception and publication."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F3; W-Darwin, W-Origin.","start":{"year":1837,"month":7,"day":1,"value":1837.495890410959},"end":{"year":1837,"month":7,"day":1,"value":1837.495890410959},"confidence":"year"},{"id":"darwin-5","chronologyId":"darwin","dateLabel":"Late 1838","title":"Darwin reads Malthus and clarifies the struggle-for-existence logic of natural selection.","summary":"","details":["Evidence: The Malthus moment is essential to Fuller's American story because \"struggle\" later travels from biological explanation into social, racial, and political interpretation. It helps explain why American readers read Origin as more than a technical book about species.","Book anchor: Chapters 3 and 10 connect Darwin's mechanism with later American arguments about competition, race, and survival.","Web context: Public summaries of Origin describe struggle for existence as one of the theory's key inferences."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for thematic importance","sources":"Sources: F3, F10; W-Darwin, W-Origin.","start":{"year":1838,"month":11,"day":15,"value":1838.8712328767124},"end":{"year":1838,"month":11,"day":15,"value":1838.8712328767124},"confidence":"year"},{"id":"darwin-6","chronologyId":"darwin","dateLabel":"1842-1844","title":"Darwin drafts and expands private sketches of his species theory.","summary":"","details":["Evidence: Fuller treats the sketches as evidence of delay, caution, and priority. They also show why Wallace's 1858 manuscript becomes a crisis: Darwin has a mature theory but has not yet made it public.","Book anchor: Chapter 3 treats the sketches as the private groundwork behind Origin.","Web context: The Origin page describes the 1842 sketch and 1844 essay as key stages in Darwin's publication history."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Origin, W-Darwin.","start":{"year":1842,"month":1,"day":1,"value":1842},"end":{"year":1844,"month":12,"day":31,"value":1844.9972677595629},"confidence":"range"},{"id":"darwin-7","chronologyId":"darwin","dateLabel":"1855","title":"Darwin sends Asa Gray an abstract of natural selection.","summary":"","details":["Evidence: This is the one Gray event that belongs on Darwin's sparse line because it bears directly on Darwin's priority and on the transatlantic route by which the theory reaches America. Fuller uses the letter as documentary ballast when Wallace independently arrives at a similar theory.","Book anchor: Chapter 3 highlights this letter as a transatlantic anchor for Darwin's claim.","Web context: Darwin and Gray sources corroborate their correspondence and Gray's role in defending Darwin."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F3; W-AsaGray, W-Darwin.","start":{"year":1855,"month":7,"day":1,"value":1855.495890410959},"end":{"year":1855,"month":7,"day":1,"value":1855.495890410959},"confidence":"year"},{"id":"darwin-8","chronologyId":"darwin","dateLabel":"June-July 1858","title":"Wallace's Ternate manuscript prompts the joint Darwin-Wallace presentation at the Linnean Society.","summary":"","details":["Evidence: Wallace's manuscript forces Darwin's private theory into public circulation. Fuller uses the episode to explain why Origin is both urgent and carefully positioned when it appears the next year.","Book anchor: Chapter 3 makes the Wallace episode the turning point from private theory to public priority problem.","Web context: Wallace, Darwin, and Origin sources place the Ternate manuscript before the 1858 joint presentation."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Wallace, W-Darwin, W-Origin.","start":{"year":1858,"month":6,"day":1,"value":1858.4136986301369},"end":{"year":1858,"month":7,"day":31,"value":1858.5780821917808},"confidence":"month range"},{"id":"darwin-9","chronologyId":"darwin","dateLabel":"November 24, 1859","title":"On the Origin of Species is published in London.","summary":"","details":["Evidence: This is the hinge event for Fuller's book: the object that moves from London to Cambridge, from Asa Gray to Brace, and from Brace into Sanborn's Concord dinner. The publication date anchors the book chronology against later chapter-order flashbacks and afterlives.","Book anchor: Chapters 1 and 3 establish the publication as both a scientific event and a physical book in transatlantic circulation.","Web context: Wikipedia and Darwin Online corroborate the title, first publication date, and bibliographic status of Origin."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F1, F3; W-Origin, DarwinOnline-Origin.","start":{"year":1859,"month":11,"day":24,"value":1859.8958904109588},"end":{"year":1859,"month":11,"day":24,"value":1859.8958904109588},"confidence":"exact"},{"id":"darwin-10","chronologyId":"darwin","dateLabel":"Mid-January 1860","title":"The Appleton American edition of Origin appears.","summary":"","details":["Evidence: The American edition changes Origin from a scarce imported book into something Thoreau can borrow from the Concord library. Fuller uses this publication shift to explain why Thoreau's Darwin reading intensifies after the New Year's dinner.","Book anchor: Chapters 1, 6, 7, and 14 trace the path from Gray's London copy to Thoreau's Appleton copy.","Web context: The Origin page describes the American publication as part of the book's rapid spread outside Britain."],"bookAnchors":[],"check":"web-confirmed for American edition context; Fuller-confirmed for Concord reading sequence","sources":"Sources: F1, F6, F7, F14; W-Origin, DarwinOnline-Origin.","start":{"year":1860,"month":7,"day":1,"value":1860.4972677595629},"end":{"year":1860,"month":7,"day":1,"value":1860.4972677595629},"confidence":"year"},{"id":"darwin-11","chronologyId":"darwin","dateLabel":"Summer 1860","title":"Darwin continues experimental work at Down House while American readers debate Origin.","summary":"","details":["Evidence: Fuller places Darwin's continuing research beside the American reception to show that Darwinism is not only a controversy abroad but also an ongoing experimental program at home. The contrast is especially sharp beside Thoreau's field observations in Concord.","Book anchor: Chapter 22 reconnects the American story to Darwin's ongoing research life at Down House.","Web context: Darwin's biography identifies botany and later plant studies among his post-Origin work."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Darwin.","start":{"year":1860,"month":7,"day":15,"value":1860.535519125683},"end":{"year":1860,"month":7,"day":15,"value":1860.535519125683},"confidence":"season"},{"id":"darwin-12","chronologyId":"darwin","dateLabel":"Summer 1862","title":"Wallace visits Darwin at Down House.","summary":"","details":["Evidence: Fuller uses the visit as a post-Thoreau, post-Origin afterpoint: natural selection's co-discoverers meet while the American Civil War is underway. It moves the book from Concord reception back to the theory's British scientific center.","Book anchor: Chapter 22 turns from American reception to Darwin's home and scientific circle.","Web context: Wallace and Darwin sources supply the relationship between the two naturalists."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Wallace, W-Darwin.","start":{"year":1862,"month":7,"day":15,"value":1862.5342465753424},"end":{"year":1862,"month":7,"day":15,"value":1862.5342465753424},"confidence":"season"},{"id":"darwin-13","chronologyId":"darwin","dateLabel":"1868","title":"Darwin publishes Variation, challenging Gray's design position.","summary":"","details":["Evidence: Fuller treats Variation as one of the later moments when Darwin's commitment to natural mechanisms strains Gray's effort to preserve providential design. The debate after Origin therefore continues beyond the dramatic year of 1860.","Book anchor: Chapter 22 follows the pressure Darwin's later work places on Gray's theology.","Web context: Darwin and Gray sources situate both men in the continuing post-Origin debate."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Darwin, W-AsaGray.","start":{"year":1868,"month":7,"day":1,"value":1868.4972677595629},"end":{"year":1868,"month":7,"day":1,"value":1868.4972677595629},"confidence":"year"},{"id":"darwin-14","chronologyId":"darwin","dateLabel":"1871","title":"Darwin publishes The Descent of Man.","summary":"","details":["Evidence: Descent makes explicit the human implications that American readers like Brace had already begun drawing from Origin. Fuller uses it to show that race, common descent, and human ancestry were not peripheral to Darwin's American reception.","Book anchor: Chapters 20 and 22 connect Brace's race manuscript and Darwin's later human-evolution argument.","Web context: Wikipedia identifies Descent as Darwin's 1871 application of evolutionary theory to human evolution and sexual selection."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F20, F22; W-Descent, W-Darwin.","start":{"year":1871,"month":7,"day":1,"value":1871.495890410959},"end":{"year":1871,"month":7,"day":1,"value":1871.495890410959},"confidence":"year"},{"id":"darwin-15","chronologyId":"darwin","dateLabel":"April 19, 1882","title":"Darwin dies at Down House and is buried in Westminster Abbey.","summary":"","details":["Evidence: Darwin's death belongs to Fuller's afterlife chapters rather than the 1860 Concord center, but it gives the optional Darwin line a clear endpoint. By then Origin has moved from first shock into institutions, literature, race debate, and memory.","Book anchor: Chapter 22 uses Darwin's later life and death to frame the mature consequences of the theory.","Web context: Wikipedia's Darwin biography confirms the date, place of death, and Westminster Abbey burial."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F22; W-Darwin.","start":{"year":1882,"month":4,"day":19,"value":1882.295890410959},"end":{"year":1882,"month":4,"day":19,"value":1882.295890410959},"confidence":"exact"}]},{"id":"john-brown","title":"John Brown","subtitle":"Abolition crisis","file":"john_brown_chronology.md","required":false,"color":"#8c3f5b","entries":[{"id":"john-brown-1","chronologyId":"john-brown","dateLabel":"May 9, 1800","title":"John Brown is born in Torrington, Connecticut.","summary":"","details":["Evidence: Brown's birth is included only to orient the optional line; Fuller's book becomes interested in Brown much later, when his antislavery militancy transforms Concord's moral atmosphere just as Origin arrives.","Web context: Wikipedia's Brown biography supplies the life dates and identifies him with radical abolitionism, Bleeding Kansas, and Harpers Ferry."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: W-JohnBrown.","start":{"year":1800,"month":5,"day":9,"value":1800.3506849315067},"end":{"year":1800,"month":5,"day":9,"value":1800.3506849315067},"confidence":"exact"},{"id":"john-brown-2","chronologyId":"john-brown","dateLabel":"1854","title":"The Kansas-Nebraska Act and Bleeding Kansas widen the slavery crisis.","summary":"","details":["Evidence: Fuller uses Kansas as the political world that radicalizes Sanborn and makes Brown more than a distant abolitionist. The same crisis helps explain why Concord readers receive Origin in an atmosphere already charged with violence, race, and national rupture.","Book anchor: Chapters 5 and 7 put Brown's Kansas world behind Sanborn and Thoreau's later responses.","Web context: Public web sources anchor Kansas-Nebraska, Bleeding Kansas, and Brown's role in that conflict."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for Sanborn/Brown background","sources":"Sources: F5, F7; W-KansasNebraska, W-BleedingKansas, W-JohnBrown.","start":{"year":1854,"month":7,"day":1,"value":1854.495890410959},"end":{"year":1854,"month":7,"day":1,"value":1854.495890410959},"confidence":"year"},{"id":"john-brown-3","chronologyId":"john-brown","dateLabel":"1856","title":"Brown gains national notoriety through militant action in Kansas.","summary":"","details":["Evidence: Fuller does not need every Kansas incident for the chronology, but Brown's turn toward antislavery violence explains why he becomes such a polarizing figure by 1859. Concord radicals later see him through this lens of prophetic action rather than ordinary politics.","Book anchor: Chapters 5 and 7 use Brown's Kansas reputation to prepare the Harpers Ferry response.","Web context: Brown and Bleeding Kansas sources summarize his national prominence in the 1850s."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5, F7; W-BleedingKansas, W-JohnBrown.","start":{"year":1856,"month":7,"day":1,"value":1856.4972677595629},"end":{"year":1856,"month":7,"day":1,"value":1856.4972677595629},"confidence":"year"},{"id":"john-brown-4","chronologyId":"john-brown","dateLabel":"1858-1859","title":"Brown receives support from the men later remembered as the Secret Six, including Franklin Sanborn.","summary":"","details":["Evidence: The Secret Six connection is central because it pulls Brown directly into the Concord network of Sanborn, Thoreau, Emerson, and the Alcotts. Fuller uses it to show that the Origin dinner takes place in a house already under pressure from federal investigation.","Book anchor: Chapters 5 and 16 make Sanborn's Brown connection a live political danger, not a retrospective footnote.","Web context: The Secret Six source identifies Sanborn as one of Brown's supporters and explains the later name for the support network."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for Sanborn's role","sources":"Sources: F5, F16; W-SecretSix, W-Sanborn, W-JohnBrown.","start":{"year":1858,"month":1,"day":1,"value":1858},"end":{"year":1859,"month":12,"day":31,"value":1859.9972602739726},"confidence":"range"},{"id":"john-brown-5","chronologyId":"john-brown","dateLabel":"June 1859","title":"Sanborn expects Brown's antislavery action to begin soon.","summary":"","details":["Evidence: Fuller's point is anticipatory: Sanborn knows Brown's plan is nearing action before the public knows anything. That foreknowledge makes the later Senate summons and arrest attempt intelligible.","Book anchor: Chapter 5 places Sanborn inside the tense months before Harpers Ferry.","Web context: Brown and Secret Six sources supply the larger public context for the plan."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5; W-SecretSix, W-JohnBrown.","start":{"year":1859,"month":6,"day":15,"value":1859.4520547945206},"end":{"year":1859,"month":6,"day":15,"value":1859.4520547945206},"confidence":"month"},{"id":"john-brown-6","chronologyId":"john-brown","dateLabel":"October 16-18, 1859","title":"Brown raids Harpers Ferry.","summary":"","details":["Evidence: Harpers Ferry is the abolition-crisis hinge in Fuller's book, just as Origin is the scientific hinge. Brown's failed raid changes how Concord reads action, martyrdom, violence, and national judgment in the weeks before Darwin's book crosses the Atlantic.","Book anchor: Chapters 1, 5, and 7 repeatedly return to the raid as the moral and political background to the New Year's Origin dinner.","Web context: Wikipedia and the American Battlefield Trust corroborate the October 16-18 dates and summarize the raid's aim, defeat, and Civil War significance."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F1, F5, F7; W-JohnBrownRaid, Battlefields-JohnBrown, W-JohnBrown.","start":{"year":1859,"month":10,"day":16,"value":1859.7890410958903},"end":{"year":1859,"month":10,"day":18,"value":1859.7945205479452},"confidence":"range"},{"id":"john-brown-7","chronologyId":"john-brown","dateLabel":"October 1859","title":"Sanborn burns papers, consults John A. Andrew, and flees toward Canada after the raid.","summary":"","details":["Evidence: The event shows how Brown's action immediately endangers his supporters. Fuller uses Sanborn's panic and paper-burning to keep Brown's raid inside the domestic spaces where Origin will soon be discussed.","Book anchor: Chapters 5 and 16 connect Sanborn's actions to the later federal arrest attempt.","Web context: Sanborn and Secret Six sources identify the network the investigation was trying to expose."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5, F16; W-Sanborn, W-SecretSix.","start":{"year":1859,"month":10,"day":15,"value":1859.786301369863},"end":{"year":1859,"month":10,"day":15,"value":1859.786301369863},"confidence":"month"},{"id":"john-brown-8","chronologyId":"john-brown","dateLabel":"October 30, 1859","title":"Thoreau first delivers \"A Plea for Captain John Brown\" in Concord.","summary":"","details":["Evidence: Fuller uses Thoreau's first Brown speech to show that the naturalist who reads Darwin most deeply is also a political radical responding to slavery. Brown therefore remains in the room, conceptually, when Thoreau turns to Origin.","Book anchor: Chapter 7 ties Thoreau's first Brown speech to his winter Darwin reading.","Web context: Plea, Thoreau, and raid sources corroborate the speech date and public abolitionist context."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for the family vote and local speech scene","sources":"Sources: F7; W-PleaJohnBrown, W-Thoreau, W-JohnBrownRaid.","start":{"year":1859,"month":10,"day":30,"value":1859.827397260274},"end":{"year":1859,"month":10,"day":30,"value":1859.827397260274},"confidence":"exact"},{"id":"john-brown-9","chronologyId":"john-brown","dateLabel":"November 2, 1859","title":"Brown is sentenced to death in Virginia.","summary":"","details":["Evidence: The sentence begins the month in which Brown becomes, for many Northern antislavery readers, a martyr rather than merely a failed raider. Fuller uses this transformation to explain Concord's emotional temperature at the turn of 1860.","Web context: The raid and Brown biographies corroborate the trial outcome and December execution sequence."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: W-JohnBrownRaid, W-JohnBrown.","start":{"year":1859,"month":11,"day":2,"value":1859.835616438356},"end":{"year":1859,"month":11,"day":2,"value":1859.835616438356},"confidence":"exact"},{"id":"john-brown-10","chronologyId":"john-brown","dateLabel":"November 1859","title":"Thoreau repeats \"A Plea for Captain John Brown\" in Boston and Worcester.","summary":"","details":["Evidence: The repeated speeches matter because Brown's defense moves beyond Concord before the execution. Fuller treats this sequence as part of the shift by which Brown becomes a martyr for Northern abolitionists.","Book anchor: Chapter 7 follows the speech from Concord to Boston and Worcester.","Web context: Plea and Thoreau sources corroborate the pre-execution repetition of the speech."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed for Boston/Worcester sequence","sources":"Sources: F7; W-PleaJohnBrown, W-Thoreau, W-JohnBrown.","start":{"year":1859,"month":11,"day":15,"value":1859.8712328767124},"end":{"year":1859,"month":11,"day":15,"value":1859.8712328767124},"confidence":"month"},{"id":"john-brown-11","chronologyId":"john-brown","dateLabel":"December 2, 1859","title":"Brown is hanged.","summary":"","details":["Evidence: Brown's execution is one of the public dates Fuller uses to anchor the book's chronology. It falls just before Gray receives Origin and before Sanborn's New Year's dinner, binding abolition martyrdom and Darwinian controversy into the same winter.","Book anchor: Chapters 1 and 7 frame Thoreau and the Concord circle's winter through Brown's death.","Web context: Brown and raid sources confirm the execution date and its place in the aftermath of Harpers Ferry."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F1, F7; W-JohnBrownRaid, W-JohnBrown.","start":{"year":1859,"month":12,"day":2,"value":1859.9178082191781},"end":{"year":1859,"month":12,"day":2,"value":1859.9178082191781},"confidence":"exact"},{"id":"john-brown-12","chronologyId":"john-brown","dateLabel":"December 2, 1859","title":"Thoreau gives \"Remarks After the Hanging of John Brown\" at Concord's memorial.","summary":"","details":["Evidence: The memorial makes Brown's execution a Concord civic event, not only a Virginia execution. Fuller places Thoreau, Emerson, Alcott, and Sanborn together at the ritual edge between mourning and political defiance.","Book anchor: Chapters 1 and 7 describe the Concord response to Brown's execution.","Web context: Remarks and raid sources corroborate Thoreau's December 2 speech and Brown's execution."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for the Concord memorial","sources":"Sources: F7, F1; W-RemarksJohnBrown, W-Thoreau, W-JohnBrownRaid.","start":{"year":1859,"month":12,"day":2,"value":1859.9178082191781},"end":{"year":1859,"month":12,"day":2,"value":1859.9178082191781},"confidence":"exact"},{"id":"john-brown-13","chronologyId":"john-brown","dateLabel":"December 31, 1859","title":"Abba Alcott reflects on Brown's martyrdom as Concord prepares for the new year.","summary":"","details":["Evidence: Fuller uses Abba Alcott's reflection to show Brown's presence in Concord households on the eve of the Origin dinner. The point is intimate and local: national crisis has become family conversation.","Book anchor: Chapter 1 places this domestic moment immediately before Sanborn hosts the Darwin dinner.","Web context: Brown and Alcott sources supply public biography while Fuller supplies the private diary context."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F1; W-JohnBrown, W-AmosBronsonAlcott.","start":{"year":1859,"month":12,"day":31,"value":1859.9972602739726},"end":{"year":1859,"month":12,"day":31,"value":1859.9972602739726},"confidence":"exact"},{"id":"john-brown-14","chronologyId":"john-brown","dateLabel":"January 16, 1860","title":"Sanborn receives a Senate summons to testify about Brown.","summary":"","details":["Evidence: Brown's raid continues to reach into Concord after his death. Fuller's chronology makes the summons overlap with the first American readings of Origin, so the scientific debate and federal investigation proceed at the same time.","Book anchor: Chapter 6 places the summons amid the Concord winter of Darwin reading and antislavery anxiety.","Web context: Sanborn and Secret Six sources explain why federal authorities wanted testimony from Brown's supporters."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F6; W-Sanborn, W-SecretSix, W-JohnBrown.","start":{"year":1860,"month":1,"day":16,"value":1860.0409836065573},"end":{"year":1860,"month":1,"day":16,"value":1860.0409836065573},"confidence":"exact"},{"id":"john-brown-15","chronologyId":"john-brown","dateLabel":"Late February 1860","title":"Sanborn returns to Concord with Sarah and Anne Brown.","summary":"","details":["Evidence: Bringing Brown's daughters to Concord makes the raid's aftermath personal for the community. Fuller uses their presence to keep Brown's family and memory alongside the unfolding Darwin controversy.","Book anchor: Chapter 12 keeps Brown's daughters inside the same seasonal arc as the early Origin debates.","Web context: Brown sources identify Sarah and Anne within Brown's family, while Fuller supplies the Concord placement."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F12; W-Sanborn, W-JohnBrown.","start":{"year":1860,"month":2,"day":25,"value":1860.1502732240438},"end":{"year":1860,"month":2,"day":25,"value":1860.1502732240438},"confidence":"month"},{"id":"john-brown-16","chronologyId":"john-brown","dateLabel":"April 3, 1860","title":"Federal marshals attempt to arrest Sanborn over Brown's raid; Concord neighbors intervene.","summary":"","details":["Evidence: This is Brown's aftershock made physical: the federal government reaches into Concord and the town resists. Fuller uses the scene to show how the Brown crisis fuses law, community loyalty, and radical politics in the same period as the Origin arguments.","Book anchor: Chapter 16 presents the arrest attempt as the dramatic local climax of Sanborn's Brown entanglement.","Web context: Sanborn and Secret Six sources corroborate the arrest context and Sanborn's Brown connection."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for local sequence","sources":"Sources: F16; W-Sanborn, W-SecretSix, W-JohnBrown.","start":{"year":1860,"month":4,"day":3,"value":1860.2540983606557},"end":{"year":1860,"month":4,"day":3,"value":1860.2540983606557},"confidence":"exact"},{"id":"john-brown-17","chronologyId":"john-brown","dateLabel":"April 4, 1860","title":"Sanborn displays the handcuffs at the Concord Town House and turns Brown's lesson into a call for resistance.","summary":"","details":["Evidence: Sanborn's speech belongs on Brown's line because Fuller presents it as an aftershock of Harpers Ferry: the town's rescued conspirator holds up the physical sign of federal power and identifies it with slavery.","Book anchor: Chapter 16 follows Sanborn from the attempted arrest to the Town House speech.","Web context: Sanborn and Secret Six sources corroborate the arrest context and Sanborn's Brown connection."],"bookAnchors":[],"check":"Fuller-confirmed for speech; web-confirmed context for arrest episode","sources":"Sources: F16; W-Sanborn, W-SecretSix, W-JohnBrown.","start":{"year":1860,"month":4,"day":4,"value":1860.2568306010928},"end":{"year":1860,"month":4,"day":4,"value":1860.2568306010928},"confidence":"exact"},{"id":"john-brown-18","chronologyId":"john-brown","dateLabel":"June 1860","title":"Mary Brown and other Brown family members visit Concord.","summary":"","details":["Evidence: The visit shows that Brown's memory remains socially active in Concord after the legal emergency passes. Fuller places the family visit beside literary and Darwinian developments, not as a separate story.","Book anchor: Chapter 17 keeps Brown's family presence in the Concord network during the summer of 1860.","Web context: Brown and Sanborn sources provide public context for the family and network."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F17; W-JohnBrown, W-Sanborn.","start":{"year":1860,"month":6,"day":15,"value":1860.4535519125684},"end":{"year":1860,"month":6,"day":15,"value":1860.4535519125684},"confidence":"month"},{"id":"john-brown-19","chronologyId":"john-brown","dateLabel":"July 4, 1860","title":"Thoreau reads \"The Last Days of John Brown\" at Brown's North Elba memorial service.","summary":"","details":["Evidence: The speech keeps Brown's death active after the legal crisis and before the war. It belongs here because the Brown chronology is tracking afterlife and public memory as much as Brown's own lifetime.","Web context: The Last Days of John Brown and Thoreau sources corroborate the July 4 memorial reading."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: W-LastDaysJohnBrown, W-Thoreau, W-JohnBrown.","start":{"year":1860,"month":7,"day":4,"value":1860.5054644808743},"end":{"year":1860,"month":7,"day":4,"value":1860.5054644808743},"confidence":"exact"},{"id":"john-brown-20","chronologyId":"john-brown","dateLabel":"January 1, 1863","title":"Emancipation takes effect, and Brown's supporters read it as vindication.","summary":"","details":["Evidence: Fuller treats Emancipation as an afterlife of Brown's prophecy: what looked criminal in 1859 becomes, to his admirers, a grim anticipation of national policy. The date also reminds the reader that Thoreau is already dead by this later Brown-memory chapter.","Book anchor: Chapter 23 places Brown's ghost inside Civil War emancipation and Concord commemoration.","Web context: The National Archives anchors the Emancipation Proclamation date, while Brown and Secret Six sources explain the memory network."],"bookAnchors":[],"check":"web-confirmed for Emancipation; Fuller-confirmed for Brown memory","sources":"Sources: F23; NatArchives-Emancipation, W-JohnBrown, W-SecretSix.","start":{"year":1863,"month":1,"day":1,"value":1863},"end":{"year":1863,"month":1,"day":1,"value":1863},"confidence":"exact"},{"id":"john-brown-21","chronologyId":"john-brown","dateLabel":"1863","title":"Bronson Alcott lectures on John Brown.","summary":"","details":["Evidence: Alcott's lecture belongs to the memory of Brown rather than the raid itself. Fuller uses it to show how Concord radicals turn Brown into a continuing moral text during the war.","Book anchor: Chapter 23 follows Brown's posthumous presence in Concord lectures and commemorations.","Web context: Alcott and Brown sources provide public biographical context; Fuller supplies the lecture's placement in the book."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F23; W-AmosBronsonAlcott, W-JohnBrown.","start":{"year":1863,"month":7,"day":1,"value":1863.495890410959},"end":{"year":1863,"month":7,"day":1,"value":1863.495890410959},"confidence":"year"},{"id":"john-brown-22","chronologyId":"john-brown","dateLabel":"1885","title":"Sanborn publishes Life and Letters of John Brown.","summary":"","details":["Evidence: Sanborn's biography turns participant memory into printed historical memory. Fuller uses the later publication to show how Brown remains central to Sanborn's identity long after Darwin's book and the Civil War have moved into retrospect.","Book anchor: Chapter 23 treats Sanborn as one of Brown's custodians in memory.","Web context: Sanborn and Brown sources corroborate Sanborn's long association with Brown."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F23; W-Sanborn, W-JohnBrown."   </script>
  <script>
    const BASE_YEAR_HEIGHT = 58;
    const EVENT_YEAR_WEIGHT = 34;
    const TOP_OFFSET = 94;
    const CARD_HEIGHT = 56;
    const CARD_GAP = 9;
    const FOCUS_BASE_YEAR_HEIGHT = 520;
    const FOCUS_EVENT_YEAR_WEIGHT = 36;
    const FOCUS_TOP_OFFSET = 96;
    const FOCUS_CARD_HEIGHT = 90;
    const FOCUS_CARD_GAP = 11;
    const FOCUS_LANES = [
      "Brown and Sanborn",
      "Darwin and Origin",
      "Concord readers",
      "Thoreau seeds and death",
      "National crisis",
      "Other",
    ];

    const state = {
      visible: new Set(MODEL.chronologies.map((c) => c.required ? c.id : null).filter(Boolean)),
      visibleFocusLanes: new Set(FOCUS_LANES),
      view: "full",
      selected: null,
    };

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");
    const grid = document.getElementById("grid");
    const columns = document.getElementById("columns");
    const focusViewport = document.getElementById("focus-viewport");
    const focusStage = document.getElementById("focus-stage");
    const focusGrid = document.getElementById("focus-grid");
    const focusLanes = document.getElementById("focus-lanes");
    const toggles = document.getElementById("toggles");
    const focusToggles = document.getElementById("focus-toggles");
    const viewTabs = document.querySelectorAll(".view-tab");
    const drawer = document.getElementById("drawer");
    const drawerDate = document.getElementById("drawer-date");
    const drawerTitle = document.getElementById("drawer-title");
    const drawerSummary = document.getElementById("drawer-summary");
    const drawerCheck = document.getElementById("drawer-check");
    const drawerSources = document.getElementById("drawer-sources");

    const yearOffsets = buildYearOffsets();
    const timelineHeight = TOP_OFFSET + yearOffsets.total + 160;
    stage.style.setProperty("--timeline-height", timelineHeight + "px");
    const focusYearOffsets = buildFocusYearOffsets();
    const focusHeight = FOCUS_TOP_OFFSET + focusYearOffsets.total + 180;
    focusStage.style.setProperty("--focus-height", focusHeight + "px");

    renderToggles();
    renderFocusToggles();
    render();

    for (const tab of viewTabs) {
      tab.addEventListener("click", () => {
        state.view = tab.dataset.view || "full";
        drawer.hidden = true;
        state.selected = null;
        render();
      });
    }

    document.getElementById("drawer-close").addEventListener("click", () => {
      drawer.hidden = true;
      state.selected = null;
    });

    function buildYearOffsets() {
      let current = 0;
      const years = {};
      for (let year = MODEL.minYear; year <= MODEL.maxYear; year += 1) {
        const events = MODEL.eventsPerYear[String(year)] || 0;
        const height = BASE_YEAR_HEIGHT + events * EVENT_YEAR_WEIGHT;
        years[year] = { start: current, height };
        current += height;
      }
      return { years, total: current };
    }

    function yFor(value) {
      const year = Math.floor(value);
      const slot = yearOffsets.years[year] || yearOffsets.years[MODEL.minYear];
      const fraction = Math.max(0, Math.min(0.999, value - year));
      return TOP_OFFSET + slot.start + slot.height * fraction;
    }

    function buildFocusYearOffsets() {
      let current = 0;
      const years = {};
      for (let year = MODEL.focusMinYear; year <= MODEL.focusMaxYear; year += 1) {
        const events = MODEL.focusEventsPerYear[String(year)] || 0;
        const height = FOCUS_BASE_YEAR_HEIGHT + events * FOCUS_EVENT_YEAR_WEIGHT;
        years[year] = { start: current, height };
        current += height;
      }
      return { years, total: current };
    }

    function focusYFor(value) {
      const year = Math.floor(value);
      const slot = focusYearOffsets.years[year] || focusYearOffsets.years[MODEL.focusMinYear];
      const fraction = Math.max(0, Math.min(0.999, value - year));
      return FOCUS_TOP_OFFSET + slot.start + slot.height * fraction;
    }

    function renderToggles() {
      toggles.innerHTML = "";
      for (const chronology of MODEL.chronologies) {
        const label = document.createElement("label");
        label.className = "toggle" + (chronology.required ? " required" : "");
        label.style.setProperty("--accent", chronology.color);

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = chronology.required || state.visible.has(chronology.id);
        input.disabled = chronology.required;
        input.addEventListener("change", () => {
          if (input.checked) {
            state.visible.add(chronology.id);
          } else {
            state.visible.delete(chronology.id);
          }
          render();
        });

        const text = document.createElement("span");
        text.textContent = chronology.title;

        label.append(input, text);
        toggles.append(label);
      }
    }

    function renderFocusToggles() {
      focusToggles.innerHTML = "";
      for (const lane of focusLaneOptions()) {
        const label = document.createElement("label");
        label.className = "toggle";
        label.style.setProperty("--accent", MODEL.focusChronology.color);

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = state.visibleFocusLanes.has(lane);
        input.addEventListener("change", () => {
          if (input.checked) {
            state.visibleFocusLanes.add(lane);
          } else {
            state.visibleFocusLanes.delete(lane);
          }
          render();
        });

        const text = document.createElement("span");
        text.textContent = lane;

        label.append(input, text);
        focusToggles.append(label);
      }
    }

    function render() {
      renderViewTabs();
      document.body.classList.toggle("focus-mode", state.view === "focus");
      viewport.hidden = state.view !== "full";
      focusViewport.hidden = state.view !== "focus";
      if (state.view === "focus") {
        renderFocusGrid();
        renderFocusLanes();
      } else {
        renderGrid();
        renderColumns();
      }
    }

    function renderViewTabs() {
      for (const tab of viewTabs) {
        const active = tab.dataset.view === state.view;
        tab.classList.toggle("active", active);
        tab.setAttribute("aria-current", active ? "page" : "false");
      }
    }

    function renderGrid() {
      grid.innerHTML = "";
      for (let year = MODEL.minYear; year <= MODEL.maxYear; year += 1) {
        if (!shouldShowYear(year)) continue;
        const y = yFor(year);
        const line = document.createElement("div");
        line.className = "gridline";
        line.style.top = y + "px";
        grid.append(line);

        const label = document.createElement("div");
        label.className = "year-label";
        label.style.top = y + "px";
        label.textContent = year;
        grid.append(label);
      }
    }

    function shouldShowYear(year) {
      if (year % 10 === 0) return true;
      if (year >= 1858 && year <= 1863) return true;
      return (MODEL.eventsPerYear[String(year)] || 0) >= 8;
    }

    function renderFocusGrid() {
      focusGrid.innerHTML = "";
      for (let year = MODEL.focusMinYear; year <= MODEL.focusMaxYear; year += 1) {
        const y = focusYFor(year);
        const line = document.createElement("div");
        line.className = "gridline";
        line.style.top = y + "px";
        focusGrid.append(line);

        const label = document.createElement("div");
        label.className = "year-label";
        label.style.top = y + "px";
        label.textContent = year;
        focusGrid.append(label);
      }
    }

    function renderFocusLanes() {
      focusLanes.innerHTML = "";
      const entriesByLane = new Map();
      for (const entry of MODEL.focusChronology.entries) {
        const lane = focusLane(entry);
        if (!entriesByLane.has(lane)) entriesByLane.set(lane, []);
        entriesByLane.get(lane).push(entry);
      }

      for (const lane of FOCUS_LANES) {
        const entries = entriesByLane.get(lane) || [];
        if (!entries.length && lane === "Other") continue;
        if (!state.visibleFocusLanes.has(lane)) continue;

        const column = document.createElement("section");
        column.className = "focus-lane";
        column.style.setProperty("--accent", MODEL.focusChronology.color);

        const header = document.createElement("div");
        header.className = "focus-lane-header";
        header.innerHTML = `
          <div class="column-title">
            <strong>${escapeHtml(lane)}</strong>
            <span>${escapeHtml(MODEL.focusChronology.subtitle)}</span>
          </div>
          <span class="count">${entries.length}</span>
        `;
        column.append(header);

        const spine = document.createElement("div");
        spine.className = "focus-spine";
        column.append(spine);

        const placed = placeFocusEvents(entries);
        let maxBottom = focusHeight;
        for (const item of placed) {
          maxBottom = Math.max(maxBottom, item.cardY + FOCUS_CARD_HEIGHT + 120);
          appendFocusEvent(column, item);
        }
        column.style.minHeight = maxBottom + "px";
        focusLanes.append(column);
      }
    }

    function focusLaneOptions() {
      const lanes = new Set(MODEL.focusChronology.entries.map((entry) => focusLane(entry)));
      return FOCUS_LANES.filter((lane) => lane !== "Other" || lanes.has("Other"));
    }

    function renderColumns() {
      columns.innerHTML = "";
      for (const chronology of MODEL.chronologies) {
        const column = document.createElement("section");
        column.className = "column";
        column.style.setProperty("--accent", chronology.color);
        if (!chronology.required && !state.visible.has(chronology.id)) {
          column.classList.add("hidden");
        }

        const header = document.createElement("div");
        header.className = "column-header";
        header.innerHTML = `
          <div class="column-title">
            <strong>${escapeHtml(chronology.title)}</strong>
            <span>${escapeHtml(chronology.subtitle)}</span>
          </div>
          <span class="count">${chronology.entries.length}</span>
        `;
        column.append(header);

        const spine = document.createElement("div");
        spine.className = "spine";
        column.append(spine);

        const placed = placeEvents(chronology.entries);
        let maxBottom = timelineHeight;
        for (const item of placed) {
          maxBottom = Math.max(maxBottom, item.cardY + CARD_HEIGHT + 120);
          appendEvent(column, chronology, item);
        }
        column.style.minHeight = maxBottom + "px";
        columns.append(column);
      }
    }

    function placeEvents(entries) {
      let lastBottom = TOP_OFFSET;
      return [...entries]
        .sort((a, b) => a.start.value - b.start.value)
        .map((entry) => {
          const markerY = yFor(entry.start.value);
          const rangeEndY = yFor(entry.end.value);
          const cardY = Math.max(markerY - 22, lastBottom + CARD_GAP);
          lastBottom = cardY + CARD_HEIGHT;
          return { entry, markerY, rangeEndY, cardY };
        });
    }

    function placeFocusEvents(entries) {
      let lastBottom = FOCUS_TOP_OFFSET;
      return [...entries]
        .sort((a, b) => a.start.value - b.start.value)
        .map((entry) => {
          const markerY = focusYFor(entry.start.value);
          const rangeEndY = focusYFor(entry.end.value);
          const cardY = Math.max(markerY - 34, lastBottom + FOCUS_CARD_GAP);
          lastBottom = cardY + FOCUS_CARD_HEIGHT;
          return { entry, markerY, rangeEndY, cardY };
        });
    }

    function appendEvent(column, chronology, item) {
      const { entry, markerY, rangeEndY, cardY } = item;

      if (rangeEndY - markerY > 20) {
        const range = document.createElement("div");
        range.className = "range";
        range.dataset.eventId = entry.id;
        range.dataset.date = entry.dateLabel;
        range.style.top = markerY + "px";
        range.style.height = Math.max(14, rangeEndY - markerY) + "px";
        column.append(range);
      }

      const dot = document.createElement("div");
      dot.className = "dot";
      dot.dataset.eventId = entry.id;
      dot.dataset.date = entry.dateLabel;
      dot.dataset.start = entry.start.value;
      dot.style.top = markerY + "px";
      column.append(dot);

      const leader = document.createElement("div");
      leader.className = "leader";
      leader.style.top = markerY + "px";
      if (Math.abs(cardY + 20 - markerY) > 8) {
        const dy = cardY + 20 - markerY;
        const angle = Math.atan2(dy, 18) * (180 / Math.PI);
        const length = Math.sqrt(18 * 18 + dy * dy);
        leader.style.width = length + "px";
        leader.style.transform = "rotate(" + angle + "deg)";
      }
      column.append(leader);

      const button = document.createElement("button");
      button.type = "button";
      button.className = "event";
      button.dataset.eventId = entry.id;
      button.dataset.date = entry.dateLabel;
      button.dataset.start = entry.start.value;
      button.style.top = cardY + "px";
      button.innerHTML = `
        <time>${escapeHtml(entry.dateLabel)}</time>
        <span class="label">${escapeHtml(entry.title)}</span>
        ${entry.check ? `<span class="check">${escapeHtml(entry.check)}</span>` : ""}
      `;
      button.addEventListener("click", () => openDrawer(chronology, entry));
      column.append(button);
    }

    function appendFocusEvent(column, item) {
      const { entry, markerY, rangeEndY, cardY } = item;

      if (rangeEndY - markerY > 20) {
        const range = document.createElement("div");
        range.className = "focus-range";
        range.dataset.eventId = entry.id;
        range.dataset.date = entry.dateLabel;
        range.style.top = markerY + "px";
        range.style.height = Math.max(14, rangeEndY - markerY) + "px";
        column.append(range);
      }

      const dot = document.createElement("div");
      dot.className = "focus-dot";
      dot.dataset.eventId = entry.id;
      dot.dataset.date = entry.dateLabel;
      dot.dataset.start = entry.start.value;
      dot.style.top = markerY + "px";
      column.append(dot);

      const leader = document.createElement("div");
      leader.className = "focus-leader";
      leader.style.top = markerY + "px";
      if (Math.abs(cardY + 30 - markerY) > 8) {
        const dy = cardY + 30 - markerY;
        const angle = Math.atan2(dy, 18) * (180 / Math.PI);
        const length = Math.sqrt(18 * 18 + dy * dy);
        leader.style.width = length + "px";
        leader.style.transform = "rotate(" + angle + "deg)";
      }
      column.append(leader);

      const button = document.createElement("button");
      button.type = "button";
      button.className = "focus-event";
      button.dataset.eventId = entry.id;
      button.dataset.date = entry.dateLabel;
      button.dataset.start = entry.start.value;
      button.style.top = cardY + "px";
      button.innerHTML = `
        <time>${escapeHtml(entry.dateLabel)}</time>
        <span class="label">${escapeHtml(entry.title)}</span>
        ${entry.check ? `<span class="check">${escapeHtml(entry.check)}</span>` : ""}
      `;
      button.addEventListener("click", () => openDrawer(MODEL.focusChronology, entry));
      column.append(button);
    }

    function focusLane(entry) {
      const lane = detailValue(entry, "Lane");
      return FOCUS_LANES.includes(lane) ? lane : "Other";
    }

    function detailValue(entry, label) {
      const prefix = label + ":";
      const line = entry.details.find((detail) => detail.startsWith(prefix));
      return line ? line.slice(prefix.length).trim().replace(/\.$/, "") : "";
    }

    function openDrawer(chronology, entry) {
      state.selected = entry.id;
      drawerDate.textContent = chronology.title + " - " + entry.dateLabel;
      drawerTitle.textContent = entry.title;
      drawerSummary.innerHTML = "";
      const paragraphs = [];
      if (entry.summary) paragraphs.push(entry.summary);
      paragraphs.push(...entry.details.filter((detail) => !detail.startsWith("Lane:")));
      if (!paragraphs.length) paragraphs.push("No additional note beyond the dated event.");
      for (const paragraph of paragraphs) {
        const p = document.createElement("p");
        const labeled = paragraph.match(/^([^:]{3,30}):s+(.+)$/);
        if (labeled) {
          const label = document.createElement("span");
          label.className = "detail-label";
          label.textContent = labeled[1] + ": ";
          p.append(label, document.createTextNode(labeled[2]));
        } else {
          p.textContent = paragraph;
        }
        drawerSummary.append(p);
      }
      drawerCheck.textContent = entry.check ? "Check: " + entry.check : "";
      drawerSources.innerHTML = "";
      const preciseBookSources = entry.bookAnchors || [];
      const seenHrefs = new Set();
      for (const source of preciseBookSources) {
        appendSourceLink(source, seenHrefs);
      }
      for (const token of sourceTokens(entry.sources)) {
        const source = MODEL.sources[token];
        if (source) {
          if (preciseBookSources.length && source.kind === "book") continue;
          appendSourceLink(source, seenHrefs, token);
        } else {
          const span = document.createElement("span");
          span.textContent = token;
          drawerSources.append(span);
        }
      }
      drawer.hidden = false;
    }

    function appendSourceLink(source, seenHrefs, fallbackLabel = "") {
      if (seenHrefs.has(source.href)) return;
      seenHrefs.add(source.href);
      const a = document.createElement("a");
      a.href = source.href;
      a.target = source.href.startsWith("http") ? "_blank" : "_self";
      a.rel = "noreferrer";
      a.textContent = source.kind === "book" || source.kind === "book-cell" ? source.display : source.display || source.description || fallbackLabel;
      a.title = source.description || source.display || fallbackLabel;
      drawerSources.append(a);
    }

    function sourceTokens(text) {
      if (!text) return [];
      const matches = text.match(/\b(?:F\d+|FPref|[A-Z][A-Za-z]+(?:-[A-Za-z0-9]+)+|W-[A-Za-z0-9]+)\b/g);
      return [...new Set(matches || [])];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
