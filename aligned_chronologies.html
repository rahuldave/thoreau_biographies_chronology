art":1589,"lineEnd":1656,"cellStart":0,"cellEnd":32,"chapterId":6983,"kind":"book-cell"},{"href":"https://closereading.rahuldave.us/books/125/chapters/6986#cell-540","display":"Notes, b0541-b0569 (book.md:2875-2932)","description":"Notes b0541-b0569; notes/b0541","lineStart":2875,"lineEnd":2932,"cellStart":540,"cellEnd":568,"chapterId":6986,"kind":"book-cell"}],"check":"web-confirmed","sources":"Sources: F22; W-Emerson.","start":{"year":1882,"month":4,"day":27,"value":1882.317808219178},"end":{"year":1882,"month":4,"day":27,"value":1882.317808219178},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Ralph_Waldo_Emerson#Final_years_and_death","display":"Wikipedia, Ralph Waldo Emerson - final years and death","description":"Wikipedia, Ralph Waldo Emerson.; nearest stable section: final years and death","kind":"web-anchor","sourceKey":"W-Emerson"}],"locationLinks":[]}]},{"id":"darwin","title":"Darwin","subtitle":"Charles Darwin","file":"darwin_chronology.md","kind":"person","defaultVisible":false,"color":"#677a2f","entries":[{"id":"darwin-1","chronologyId":"darwin","dateLabel":"February 12, 1809","title":"Charles Darwin is born in Shrewsbury, England.","summary":"","details":["Summary: Darwin was born into a prosperous English family with medical, scientific, and reform connections. Fuller needs the birth only as the start of the life that will eventually produce Origin.","Evidence: Darwin's birth anchors the scientific life behind Origin, but the main chronology only needs it as a starting point for Fuller's prehistory of the theory. Fuller introduces Darwin through the habits that later matter: collecting, patient comparison, and reluctance to publish before the evidence is overwhelming.","Book anchor: Chapter 3: Beetles, Birds, Theories places Darwin's formation behind the shock Americans feel in 1859-1860.","Web context: Wikipedia's Darwin biography supplies the public life dates and identifies natural selection as Darwin's central scientific contribution."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Darwin.","start":{"year":1809,"month":2,"day":12,"value":1809.1150684931506},"end":{"year":1809,"month":2,"day":12,"value":1809.1150684931506},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Malthus_and_natural_selection","display":"Wikipedia, Charles Darwin - Malthus and natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: Malthus and natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-2","chronologyId":"darwin","dateLabel":"1825-1827","title":"Darwin studies medicine at Edinburgh, then moves toward Cambridge and natural history.","summary":"","details":["Summary: Darwin tried medical study at Edinburgh, disliked much of it, and moved toward Cambridge and natural history. The detour pushed him away from a conventional profession and toward collecting, observing, and correspondence.","Evidence: Fuller treats these years as a turn away from conventional professional training and toward natural-history practice. The shift helps explain why Origin arrives as an evidentiary argument built from specimens, field observation, and correspondence.","Book anchor: Chapter 3 uses this educational detour to set up Darwin's later authority as an observer.","Web context: The Darwin biography corroborates Edinburgh and Cambridge as the institutional background to his natural-history career."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for interpretive placement","sources":"Sources: F3; W-Darwin.","start":{"year":1825,"month":1,"day":1,"value":1825},"end":{"year":1827,"month":12,"day":31,"value":1827.9972602739726},"confidence":"range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-3","chronologyId":"darwin","dateLabel":"December 27, 1831-October 2, 1836","title":"Darwin sails on HMS Beagle and returns with evidence that species may not be fixed.","summary":"","details":["Summary: Darwin sailed as a naturalist on HMS Beagle and gathered fossils, specimens, and distribution evidence across the globe. The voyage supplied the observations that later made fixed species seem doubtful to him.","Evidence: The Beagle voyage is the field base for the theory Fuller follows into America. Geographic distribution, fossils, and island variation become the observations that later make Origin persuasive to readers already aware of Darwin as a travel writer and naturalist.","Book anchor: Chapters 3, 6, and 7 use the Beagle background to connect Darwin's theory to Gray, Brace, and Thoreau's reading.","Web context: Darwin and Origin summaries identify the voyage as the empirical seedbed for his later evolutionary argument."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for thematic importance","sources":"Sources: F3, F6, F7; W-Darwin, W-Origin.","start":{"year":1831,"month":12,"day":27,"value":1831.986301369863},"end":{"year":1836,"month":10,"day":2,"value":1836.7513661202186},"confidence":"range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Survey_voyage_on_HMS_Beagle","display":"Wikipedia, Charles Darwin - HMS Beagle voyage","description":"Wikipedia, Charles Darwin.; nearest stable section: HMS Beagle voyage","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Descent_of_Man.2C_sexual_selection.2C_and_botany","display":"Wikipedia, Charles Darwin - Descent of Man, sexual selection, and botany","description":"Wikipedia, Charles Darwin.; nearest stable section: Descent of Man, sexual selection, and botany","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Summary_of_Darwin.27s_theory","display":"Wikipedia, On the Origin of Species - summary of Darwin's theory","description":"Wikipedia, On the Origin of Species.; nearest stable section: summary of Darwin's theory","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication_outside_Great_Britain","display":"Wikipedia, On the Origin of Species - publication outside Great Britain","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication outside Great Britain","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Impact_on_the_scientific_community","display":"Wikipedia, On the Origin of Species - scientific reception","description":"Wikipedia, On the Origin of Species.; nearest stable section: scientific reception","kind":"web-anchor","sourceKey":"W-Origin"}],"locationLinks":[]},{"id":"darwin-4","chronologyId":"darwin","dateLabel":"1837","title":"Darwin begins systematic notebooks on species transmutation.","summary":"","details":["Summary: Darwin opened notebooks on transmutation after the Beagle voyage. In them, he began turning scattered observations into a systematic inquiry into species change.","Evidence: The notebooks mark the point where Darwin's observations become an explicit inquiry into species change. Fuller uses this long private development to distinguish Origin from sudden speculation.","Book anchor: Chapter 3 uses the notebooks to show how long Darwin withheld and refined his argument.","Web context: The Origin page notes Darwin's early notes and sketches as part of the delay between conception and publication."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F3; W-Darwin, W-Origin.","start":{"year":1837,"month":7,"day":1,"value":1837.495890410959},"end":{"year":1837,"month":7,"day":1,"value":1837.495890410959},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Survey_voyage_on_HMS_Beagle","display":"Wikipedia, Charles Darwin - HMS Beagle voyage","description":"Wikipedia, Charles Darwin.; nearest stable section: HMS Beagle voyage","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-5","chronologyId":"darwin","dateLabel":"Late 1838","title":"Darwin reads Malthus and clarifies the struggle-for-existence logic of natural selection.","summary":"","details":["Summary: Darwin read Malthus and saw how population pressure could produce a struggle for existence. That insight helped him formulate natural selection as a mechanism rather than only a suspicion that species changed.","Evidence: The Malthus moment is essential to Fuller's American story because \"struggle\" later travels from biological explanation into social, racial, and political interpretation. It helps explain why American readers read Origin as more than a technical book about species.","Book anchor: Chapters 3 and 10 connect Darwin's mechanism with later American arguments about competition, race, and survival.","Web context: Public summaries of Origin describe struggle for existence as one of the theory's key inferences."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for thematic importance","sources":"Sources: F3, F10; W-Darwin, W-Origin.","start":{"year":1838,"month":11,"day":15,"value":1838.8712328767124},"end":{"year":1838,"month":11,"day":15,"value":1838.8712328767124},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Malthus_and_natural_selection","display":"Wikipedia, Charles Darwin - Malthus and natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: Malthus and natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Summary_of_Darwin.27s_theory","display":"Wikipedia, On the Origin of Species - summary of Darwin's theory","description":"Wikipedia, On the Origin of Species.; nearest stable section: summary of Darwin's theory","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication_outside_Great_Britain","display":"Wikipedia, On the Origin of Species - publication outside Great Britain","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication outside Great Britain","kind":"web-anchor","sourceKey":"W-Origin"}],"locationLinks":[]},{"id":"darwin-6","chronologyId":"darwin","dateLabel":"1842-1844","title":"Darwin drafts and expands private sketches of his species theory.","summary":"","details":["Summary: Darwin wrote private sketches of his theory but kept them unpublished. These drafts show that the theory was mature long before Origin, which is why Wallace's 1858 manuscript created a priority crisis.","Evidence: Fuller treats the sketches as evidence of delay, caution, and priority. They also show why Wallace's 1858 manuscript becomes a crisis: Darwin has a mature theory but has not yet made it public.","Book anchor: Chapter 3 treats the sketches as the private groundwork behind Origin.","Web context: The Origin page describes the 1842 sketch and 1844 essay as key stages in Darwin's publication history."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Origin, W-Darwin.","start":{"year":1842,"month":1,"day":1,"value":1842},"end":{"year":1844,"month":12,"day":31,"value":1844.9972677595629},"confidence":"range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Joint_publication_of_papers_by_Wallace_and_Darwin","display":"Wikipedia, On the Origin of Species - Darwin-Wallace joint publication","description":"Wikipedia, On the Origin of Species.; nearest stable section: Darwin-Wallace joint publication","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication","display":"Wikipedia, On the Origin of Species - publication","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia,  of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-8","chronologyId":"darwin","dateLabel":"June-July 1858","title":"Wallace's Ternate manuscript prompts the joint Darwin-Wallace presentation at the Linnean Society.","summary":"","details":["Summary: Wallace independently sent Darwin a manuscript that described natural selection. Darwin's friends arranged a joint Linnean Society presentation, moving the theory into public scientific record.","Evidence: Wallace's manuscript forces Darwin's private theory into public circulation. Fuller uses the episode to explain why Origin is both urgent and carefully positioned when it appears the next year.","Book anchor: Chapter 3 makes the Wallace episode the turning point from private theory to public priority problem.","Web context: Wallace, Darwin, and Origin sources place the Ternate manuscript before the 1858 joint presentation."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F3; W-Wallace, W-Darwin, W-Origin.","start":{"year":1858,"month":6,"day":1,"value":1858.4136986301369},"end":{"year":1858,"month":7,"day":31,"value":1858.5780821917808},"confidence":"month range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Alfred_Russel_Wallace#Natural_selection_and_Darwin","display":"Wikipedia, Alfred Russel Wallace - natural selection and Darwin","description":"Wikipedia, Alfred Russel Wallace.; nearest stable section: natural selection and Darwin","kind":"web-anchor","sourceKey":"W-Wallace"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Malthus_and_natural_selection","display":"Wikipedia, Charles Darwin - Malthus and natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: Malthus and natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Summary_of_Darwin.27s_theory","display":"Wikipedia, On the Origin of Species - summary of Darwin's theory","description":"Wikipedia, On the Origin of Species.; nearest stable section: summary of Darwin's theory","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Joint_publication_of_papers_by_Wallace_and_Darwin","display":"Wikipedia, On the Origin of Species - Darwin-Wallace joint publication","description":"Wikipedia, On the Origin of Species.; nearest stable section: Darwin-Wallace joint publication","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Impact_on_the_scientific_community","display":"Wikipedia, On the Origin of Species - scientific reception","description":"Wikipedia, On the Origin of Species.; nearest stable section: scientific reception","kind":"web-anchor","sourceKey":"W-Origin"}],"locationLinks":[]},{"id":"darwin-9","chronologyId":"darwin","dateLabel":"December 1858-Spring 1859","title":"Asa Gray begins using Darwinian descent against Agassiz's fixed-species geography.","summary":"","details":["Summary: Gray used Darwinian descent to challenge Agassiz's claim that plant distributions reflected separate creations. The debate made Darwin's unpublished theory an active weapon in American science before Origin appeared.","Evidence: This stays sparse on Darwin's line, but it matters because Darwin's unpublished theory already has an American advocate before Origin appears. Gray's plant-geography argument helps explain why he becomes the book's most important American defender.","Book anchor: Chapter 3 gives Darwin's earlier botanical questions to Gray; Chapter 11 shows Gray later turning those methods against Agassiz.","Web context: Wired's Gray/Agassiz account confirms the December 1858 Cambridge reading and the February-April 1859 Academy debates."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for the Darwin-Gray botanical setup","sources":"Sources: F3, F11; Wired-GrayAgassiz, W-AsaGray, W-Agassiz.","start":{"year":1858,"month":7,"day":1,"value":1858.495890410959},"end":{"year":1858,"month":7,"day":1,"value":1858.495890410959},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Asa_Gray#Relationship_with_Darwin","display":"Wikipedia, Asa Gray - relationship with Darwin","description":"Wikipedia, Asa Gray.; nearest stable section: relationship with Darwin","kind":"web-anchor","sourceKey":"W-AsaGray"},{"href":"https://en.wikipedia.org/wiki/Asa_Gray#Harvard_professor","display":"Wikipedia, Asa Gray - Harvard professor","description":"Wikipedia, Asa Gray.; nearest stable section: Harvard professor","kind":"web-anchor","sourceKey":"W-AsaGray"},{"href":"https://en.wikipedia.org/wiki/Louis_Agassiz#United_States","display":"Wikipedia, Louis Agassiz - United States career","description":"Wikipedia, Louis Agassiz.; nearest stable section: United States career","kind":"web-anchor","sourceKey":"W-Agassiz"},{"href":"https://en.wikipedia.org/wiki/Louis_Agassiz#Polygenism_and_racism","display":"Wikipedia, Louis Agassiz - polygenism and racism","description":"Wikipedia, Louis Agassiz.; nearest stable section: polygenism and racism","kind":"web-anchor","sourceKey":"W-Agassiz"}],"locationLinks":[]},{"id":"darwin-10","chronologyId":"darwin","dateLabel":"November 24, 1859","title":"On the Origin of Species is published in London.","summary":"","details":["Summary: Origin was published in London and quickly sold out. The book converted Darwin's long private theory into the public controversy that Fuller follows across the Atlantic.","Evidence: This is the hinge event for Fuller's book: the object that moves from London to Cambridge, from Asa Gray to Brace, and from Brace into Sanborn's Concord dinner. The publication date anchors the book chronology against later chapter-order flashbacks and afterlives.","Book anchor: Chapters 1 and 3 establish the publication as both a scientific event and a physical book in transatlantic circulation.","Web context: Wikipedia and Darwin Online corroborate the title, first publication date, and bibliographic status of Origin."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F1, F3; W-Origin, DarwinOnline-Origin.","start":{"year":1859,"month":11,"day":24,"value":1859.8958904109588},"end":{"year":1859,"month":11,"day":24,"value":1859.8958904109588},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication","display":"Wikipedia, On the Origin of Species - publication","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Impact_on_the_scientific_community","display":"Wikipedia, On the Origin of Species - scientific reception","description":"Wikipedia, On the Origin of Species.; nearest stable section: scientific reception","kind":"web-anchor","sourceKey":"W-Origin"}],"locationLinks":[]},{"id":"darwin-11","chronologyId":"darwin","dateLabel":"Mid-January 1860","title":"The Appleton American edition of Origin appears.","summary":"","details":["Summary: Appleton's American edition made Origin available beyond the few imported London copies. In Concord, that meant Thoreau could borrow and annotate the book for sustained reading.","Evidence: The American edition changes Origin from a scarce imported book into something Thoreau can borrow from the Concord library. Fuller uses this publication shift to explain why Thoreau's Darwin reading intensifies after the New Year's dinner.","Book anchor: Chapters 1, 6, 7, and 14 trace the path from Gray's London copy to Thoreau's Appleton copy.","Web context: The Origin page describes the American publication as part of the book's rapid spread outside Britain."],"bookAnchors":[],"check":"web-confirmed for American edition context; Fuller-confirmed for Concord reading sequence","sources":"Sources: F1, F6, F7, F14; W-Origin, DarwinOnline-Origin.","start":{"year":1860,"month":7,"day":1,"value":1860.4972677595629},"end":{"year":1860,"month":7,"day":1,"value":1860.4972677595629},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication","display":"Wikipedia, On the Origin of Species - publication","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Publication_outside_Great_Britain","display":"Wikipedia, On the Origin of Species - publication outside Great Britain","description":"Wikipedia, On the Origin of Species.; nearest stable section: publication outside Great Britain","kind":"web-anchor","sourceKey":"W-Origin"},{"href":"https://en.wikipedia.org/wiki/On_the_Origin_of_Species#Impact_on_the_scientific_community","display":"Wikipedia, On the Origin of Species - scientific reception","description":"Wikipedia, On the Origin of Species.; nearest stable section: scientific reception","kind":"web-anchor","sourceKey":"W-Origin"}],"locationLinks":[]},{"id":"darwin-12","chronologyId":"darwin","dateLabel":"Summer 1860","title":"Darwin continues experimental work at Down House while American readers debate Origin.","summary":"","details":["Summary: Darwin kept experimenting at Down House while Americans argued over his book. Fuller uses this contrast to show Darwinism as both public controversy and continuing research practice.","Evidence: Fuller places Darwin's continuing research beside the American reception to show that Darwinism is not only a controversy abroad but also an ongoing experimental program at home. The contrast is especially sharp beside Thoreau's field observations in Concord.","Book anchor: Chapter 22 reconnects the American story to Darwin's ongoing research life at Down House.","Web context: Darwin's biography identifies botany and later plant studies among his post-Origin work."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Darwin.","start":{"year":1860,"month":7,"day":15,"value":1860.535519125683},"end":{"year":1860,"month":7,"day":15,"value":1860.535519125683},"confidence":"season","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Descent_of_Man.2C_sexual_selection.2C_and_botany","display":"Wikipedia, Charles Darwin - Descent of Man, sexual selection, and botany","description":"Wikipedia, Charles Darwin.; nearest stable section: Descent of Man, sexual selection, and botany","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-13","chronologyId":"darwin","dateLabel":"Summer 1862","title":"Wallace visits Darwin at Down House.","summary":"","details":["Summary: Wallace visited Darwin at Down House after Origin had already reshaped scientific debate. The meeting joins the co-discoverers of natural selection after the American reception story has moved past Thoreau's death.","Evidence: Fuller uses the visit as a post-Thoreau, post-Origin afterpoint: natural selection's co-discoverers meet while the American Civil War is underway. It moves the book from Concord reception back to the theory's British scientific center.","Book anchor: Chapter 22 turns from American reception to Darwin's home and scientific circle.","Web context: Wallace and Darwin sources supply the relationship between the two naturalists."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Wallace, W-Darwin.","start":{"year":1862,"month":7,"day":15,"value":1862.5342465753424},"end":{"year":1862,"month":7,"day":15,"value":1862.5342465753424},"confidence":"season","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Alfred_Russel_Wallace#Natural_selection_and_Darwin","display":"Wikipedia, Alfred Russel Wallace - natural selection and Darwin","description":"Wikipedia, Alfred Russel Wallace.; nearest stable section: natural selection and Darwin","kind":"web-anchor","sourceKey":"W-Wallace"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Malthus_and_natural_selection","display":"Wikipedia, Charles Darwin - Malthus and natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: Malthus and natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-14","chronologyId":"darwin","dateLabel":"1868","title":"Darwin publishes Variation, challenging Gray's design position.","summary":"","details":["Summary: Darwin published Variation of Animals and Plants under Domestication, extending his evidence for descent and heredity. The work increased pressure on Gray's attempt to reconcile Darwin with providential design.","Evidence: Fuller treats Variation as one of the later moments when Darwin's commitment to natural mechanisms strains Gray's effort to preserve providential design. The debate after Origin therefore continues beyond the dramatic year of 1860.","Book anchor: Chapter 22 follows the pressure Darwin's later work places on Gray's theology.","Web context: Darwin and Gray sources situate both men in the continuing post-Origin debate."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F22; W-Darwin, W-AsaGray.","start":{"year":1868,"month":7,"day":1,"value":1868.4972677595629},"end":{"year":1868,"month":7,"day":1,"value":1868.4972677595629},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Descent_of_Man.2C_sexual_selection.2C_and_botany","display":"Wikipedia, Charles Darwin - Descent of Man, sexual selection, and botany","description":"Wikipedia, Charles Darwin.; nearest stable section: Descent of Man, sexual selection, and botany","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Asa_Gray#Relationship_with_Darwin","display":"Wikipedia, Asa Gray - relationship with Darwin","description":"Wikipedia, Asa Gray.; nearest stable section: relationship with Darwin","kind":"web-anchor","sourceKey":"W-AsaGray"}],"locationLinks":[]},{"id":"darwin-15","chronologyId":"darwin","dateLabel":"1871","title":"Darwin publishes The Descent of Man.","summary":"","details":["Summary: Darwin published The Descent of Man and applied evolutionary reasoning explicitly to humans. The book made unavoidable many of the race and ancestry questions that American readers had already drawn from Origin.","Evidence: Descent makes explicit the human implications that American readers like Brace had already begun drawing from Origin. Fuller uses it to show that race, common descent, and human ancestry were not peripheral to Darwin's American reception.","Book anchor: Chapters 20 and 22 connect Brace's race manuscript and Darwin's later human-evolution argument.","Web context: Wikipedia identifies Descent as Darwin's 1871 application of evolutionary theory to human evolution and sexual selection."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F20, F22; W-Descent, W-Darwin.","start":{"year":1871,"month":7,"day":1,"value":1871.495890410959},"end":{"year":1871,"month":7,"day":1,"value":1871.495890410959},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Descent_of_Man.2C_sexual_selection.2C_and_botany","display":"Wikipedia, Charles Darwin - Descent of Man, sexual selection, and botany","description":"Wikipedia, Charles Darwin.; nearest stable section: Descent of Man, sexual selection, and botany","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]},{"id":"darwin-16","chronologyId":"darwin","dateLabel":"April 19, 1882","title":"Darwin dies at Down House and is buried in Westminster Abbey.","summary":"","details":["Summary: Darwin died at Down House and was buried in Westminster Abbey. By then Origin had moved from a shocking book into a central work of modern science and public culture.","Evidence: Darwin's death belongs to Fuller's afterlife chapters rather than the 1860 Concord center, but it gives the optional Darwin line a clear endpoint. By then Origin has moved from first shock into institutions, literature, race debate, and memory.","Book anchor: Chapter 22 uses Darwin's later life and death to frame the mature consequences of the theory.","Web context: Wikipedia's Darwin biography confirms the date, place of death, and Westminster Abbey burial."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F22; W-Darwin.","start":{"year":1882,"month":4,"day":19,"value":1882.295890410959},"end":{"year":1882,"month":4,"day":19,"value":1882.295890410959},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Publication_of_the_theory_of_natural_selection","display":"Wikipedia, Charles Darwin - publication of natural selection","description":"Wikipedia, Charles Darwin.; nearest stable section: publication of natural selection","kind":"web-anchor","sourceKey":"W-Darwin"},{"href":"https://en.wikipedia.org/wiki/Charles_Darwin#Responses_to_publication","display":"Wikipedia, Charles Darwin - responses to publication","description":"Wikipedia, Charles Darwin.; nearest stable section: responses to publication","kind":"web-anchor","sourceKey":"W-Darwin"}],"locationLinks":[]}]},{"id":"john-brown","title":"John Brown","subtitle":"Abolition crisis","file":"john_brown_chronology.md","kind":"person","defaultVisible":false,"color":"#8c3f5b","entries":[{"id":"john-brown-1","chronologyId":"john-brown","dateLabel":"May 9, 1800","title":"John Brown is born in Torrington, Connecticut.","summary":"","details":["Summary: Brown was born in Torrington and grew up to become the best-known militant abolitionist in the United States. His early life matters here chiefly because Fuller later follows his explosive entrance into Concord politics and memory.","Evidence: Brown's birth is included only to orient the optional line; Fuller's book becomes interested in Brown much later, when his antislavery militancy transforms Concord's moral atmosphere just as Origin arrives.","Web context: Wikipedia's Brown biography supplies the life dates and identifies him with radical abolitionism, Bleeding Kansas, and Harpers Ferry."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: W-JohnBrown.","start":{"year":1800,"month":5,"day":9,"value":1800.3506849315067},"end":{"year":1800,"month":5,"day":9,"value":1800.3506849315067},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Actions_in_Kansas","display":"Wikipedia, John Brown (abolitionist) - actions in Kansas","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: actions in Kansas","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Raid_at_Harpers_Ferry","display":"Wikipedia, John Brown (abolitionist) - raid at Harpers Ferry","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: raid at Harpers Ferry","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Legacy","display":"Wikipedia, John Brown (abolitionist) - legacy","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: legacy","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-2","chronologyId":"john-brown","dateLabel":"1854","title":"The Kansas-Nebraska Act and Bleeding Kansas widen the slavery crisis.","summary":"","details":["Summary: The Kansas-Nebraska Act opened Kansas and Nebraska to the possibility of slavery through popular sovereignty, intensifying sectional conflict. Armed clashes in Kansas soon made slavery a national crisis of violence rather than only legislation.","Evidence: Fuller uses Kansas as the political world that radicalizes Sanborn and makes Brown more than a distant abolitionist. The same crisis helps explain why Concord readers receive Origin in an atmosphere already charged with violence, race, and national rupture.","Book anchor: Chapters 5 and 7 put Brown's Kansas world behind Sanborn and Thoreau's later responses.","Web context: Public web sources anchor Kansas-Nebraska, Bleeding Kansas, and Brown's role in that conflict."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for Sanborn/Brown background","sources":"Sources: F5, F7; W-KansasNebraska, W-BleedingKansas, W-JohnBrown.","start":{"year":1854,"month":7,"day":1,"value":1854.495890410959},"end":{"year":1854,"month":7,"day":1,"value":1854.495890410959},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Kansas%E2%80%93Nebraska_Act#Bleeding_Kansas","display":"Wikipedia, Kansas-Nebraska Act - Bleeding Kansas","description":"Wikipedia, Kansas-Nebraska Act.; nearest stable section: Bleeding Kansas","kind":"web-anchor","sourceKey":"W-KansasNebraska"},{"href":"https://en.wikipedia.org/wiki/Kansas%E2%80%93Nebraska_Act#Enactment","display":"Wikipedia, Kansas-Nebraska Act - enactment","description":"Wikipedia, Kansas-Nebraska Act.; nearest stable section: enactment","kind":"web-anchor","sourceKey":"W-KansasNebraska"},{"href":"https://en.wikipedia.org/wiki/Bleeding_Kansas#Open_violence","display":"Wikipedia, Bleeding Kansas - open violence","description":"Wikipedia, Bleeding Kansas.; nearest stable section: open violence","kind":"web-anchor","sourceKey":"W-BleedingKansas"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Actions_in_Kansas","display":"Wikipedia, John Brown (abolitionist) - actions in Kansas","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: actions in Kansas","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Financial_and_political_backing","display":"Wikipedia, John Brown (abolitionist) - financial and political backing","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: financial and political backing","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-3","chronologyId":"john-brown","dateLabel":"1856","title":"Brown gains national notoriety through militant action in Kansas.","summary":"","details":["Summary: In Kansas, Brown moved from antislavery organizing into armed conflict, most notoriously around the Pottawatomie killings and the fighting at Osawatomie. Those actions made him nationally visible as a militant abolitionist before Harpers Ferry.","Evidence: Fuller does not need every Kansas incident for the chronology, but Brown's turn toward antislavery violence explains why he becomes such a polarizing figure by 1859. Concord radicals later see him through this lens of prophetic action rather than ordinary politics.","Book anchor: Chapters 5 and 7 use Brown's Kansas reputation to prepare the Harpers Ferry response.","Web context: Brown and Bleeding Kansas sources summarize his national prominence in the 1850s."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5, F7; W-BleedingKansas, W-JohnBrown.","start":{"year":1856,"month":7,"day":1,"value":1856.4972677595629},"end":{"year":1856,"month":7,"day":1,"value":1856.4972677595629},"confidence":"year","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Bleeding_Kansas#Summer_of_1856","display":"Wikipedia, Bleeding Kansas - summer of 1856","description":"Wikipedia, Bleeding Kansas.; nearest stable section: summer of 1856","kind":"web-anchor","sourceKey":"W-BleedingKansas"},{"href":"https://en.wikipedia.org/wiki/Bleeding_Kansas#Open_violence","display":"Wikipedia, Bleeding Kansas - open violence","description":"Wikipedia, Bleeding Kansas.; nearest stable section: open violence","kind":"web-anchor","sourceKey":"W-BleedingKansas"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Actions_in_Kansas","display":"Wikipedia, John Brown (abolitionist) - actions in Kansas","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: actions in Kansas","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Raid_at_Harpers_Ferry","display":"Wikipedia, John Brown (abolitionist) - raid at Harpers Ferry","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: raid at Harpers Ferry","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-4","chronologyId":"john-brown","dateLabel":"1858-1859","title":"Brown receives support from the men later remembered as the Secret Six, including Franklin Sanborn.","summary":"","details":["Summary: Brown drew money, weapons, and moral support from Northern abolitionists later called the Secret Six. Sanborn's participation tied Brown's plans directly to the Concord network in Fuller's book.","Evidence: The Secret Six connection is central because it pulls Brown directly into the Concord network of Sanborn, Thoreau, Emerson, and the Alcotts. Fuller uses it to show that the Origin dinner takes place in a house already under pressure from federal investigation.","Book anchor: Chapters 5 and 16 make Sanborn's Brown connection a live political danger, not a retrospective footnote.","Web context: The Secret Six source identifies Sanborn as one of Brown's supporters and explains the later name for the support network."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for Sanborn's role","sources":"Sources: F5, F16; W-SecretSix, W-Sanborn, W-JohnBrown.","start":{"year":1858,"month":1,"day":1,"value":1858},"end":{"year":1859,"month":12,"day":31,"value":1859.9972602739726},"confidence":"range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Secret_Six#Involvement_with_John_Brown","display":"Wikipedia, Secret Six - involvement with John Brown","description":"Wikipedia, Secret Six.; nearest stable section: involvement with John Brown","kind":"web-anchor","sourceKey":"W-SecretSix"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Financial_and_political_backing","display":"Wikipedia, John Brown (abolitionist) - financial and political backing","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: financial and political backing","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-5","chronologyId":"john-brown","dateLabel":"June 1859","title":"Sanborn expects Brown's antislavery action to begin soon.","summary":"","details":["Summary: By June 1859, Sanborn believed Brown's long-promised antislavery action was close. The expectation shows that Brown's raid was not, for his supporters, a sudden bolt from nowhere.","Evidence: Fuller's point is anticipatory: Sanborn knows Brown's plan is nearing action before the public knows anything. That foreknowledge makes the later Senate summons and arrest attempt intelligible.","Book anchor: Chapter 5 places Sanborn inside the tense months before Harpers Ferry.","Web context: Brown and Secret Six sources supply the larger public context for the plan."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5; W-SecretSix, W-JohnBrown.","start":{"year":1859,"month":6,"day":15,"value":1859.4520547945206},"end":{"year":1859,"month":6,"day":15,"value":1859.4520547945206},"confidence":"month","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Secret_Six#Involvement_with_John_Brown","display":"Wikipedia, Secret Six - involvement with John Brown","description":"Wikipedia, Secret Six.; nearest stable section: involvement with John Brown","kind":"web-anchor","sourceKey":"W-SecretSix"},{"href":"https://en.wikipedia.org/wiki/Secret_Six#Aftermath","display":"Wikipedia, Secret Six - aftermath","description":"Wikipedia, Secret Six.; nearest stable section: aftermath","kind":"web-anchor","sourceKey":"W-SecretSix"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Financial_and_political_backing","display":"Wikipedia, John Brown (abolitionist) - financial and political backing","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: financial and political backing","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Raid_at_Harpers_Ferry","display":"Wikipedia, John Brown (abolitionist) - raid at Harpers Ferry","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: raid at Harpers Ferry","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-6","chronologyId":"john-brown","dateLabel":"October 16-18, 1859","title":"Brown raids Harpers Ferry.","summary":"","details":["Summary: Brown and his small force seized the federal armory at Harpers Ferry in hopes of sparking an enslaved people's uprising. The raid failed militarily, but it became one of the decisive moral and political shocks before the Civil War.","Evidence: Harpers Ferry is the abolition-crisis hinge in Fuller's book, just as Origin is the scientific hinge. Brown's failed raid changes how Concord reads action, martyrdom, violence, and national judgment in the weeks before Darwin's book crosses the Atlantic.","Book anchor: Chapters 1, 5, and 7 repeatedly return to the raid as the moral and political background to the New Year's Origin dinner.","Web context: Wikipedia and the National Park Service corroborate the October 16-18 dates and summarize the raid's aim, defeat, and Civil War significance."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: F1, F5, F7; W-JohnBrownRaid, NPS-JohnBrownRaid, W-JohnBrown.","start":{"year":1859,"month":10,"day":16,"value":1859.7890410958903},"end":{"year":1859,"month":10,"day":18,"value":1859.7945205479452},"confidence":"range","webAnchors":[{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Timeline_of_the_raid","display":"Wikipedia, John Brown's raid on Harpers Ferry - timeline of the raid","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: timeline of the raid","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Legacy","display":"Wikipedia, John Brown's raid on Harpers Ferry - legacy","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: legacy","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Raid_at_Harpers_Ferry","display":"Wikipedia, John Brown (abolitionist) - raid at Harpers Ferry","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: raid at Harpers Ferry","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Last_words.2C_death_and_aftermath","display":"Wikipedia, John Brown (abolitionist) - death and aftermath","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: death and aftermath","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-7","chronologyId":"john-brown","dateLabel":"Late October 1859","title":"Sanborn burns papers, consults John A. Andrew, and bolts to Quebec after Brown's raid.","summary":"","details":["Summary: After the raid, Sanborn destroyed papers, consulted future Massachusetts governor John A. Andrew, and fled to Quebec. This was his first flight to Canada and shows how quickly Brown's captured correspondence endangered his supporters.","Evidence: The event shows how Brown's action immediately endangers his supporters. Fuller makes this the first Canada flight, distinct from Sanborn's second flight after the January 1860 Mason summons.","Book anchor: Chapters 5 and 16 connect Sanborn's actions to the later federal arrest attempt.","Web context: Sanborn and Secret Six sources identify the network the investigation was trying to expose; the raid source supplies the captured-correspondence context."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed private/book-specific date or placement","sources":"Sources: F5, F16; W-Sanborn, W-SecretSix, W-JohnBrownRaid.","start":{"year":1859,"month":10,"day":25,"value":1859.813698630137},"end":{"year":1859,"month":10,"day":25,"value":1859.813698630137},"confidence":"month","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Secret_Six#Involvement_with_John_Brown","display":"Wikipedia, Secret Six - involvement with John Brown","description":"Wikipedia, Secret Six.; nearest stable section: involvement with John Brown","kind":"web-anchor","sourceKey":"W-SecretSix"},{"href":"https://en.wikipedia.org/wiki/Secret_Six#Aftermath","display":"Wikipedia, Secret Six - aftermath","description":"Wikipedia, Secret Six.; nearest stable section: aftermath","kind":"web-anchor","sourceKey":"W-SecretSix"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Advance_knowledge_of_the_raid","display":"Wikipedia, John Brown's raid on Harpers Ferry - advance knowledge of the raid","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: advance knowledge of the raid","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Timeline_of_the_raid","display":"Wikipedia, John Brown's raid on Harpers Ferry - timeline of the raid","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: timeline of the raid","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"}],"locationLinks":[]},{"id":"john-brown-8","chronologyId":"john-brown","dateLabel":"October 30, 1859","title":"Thoreau first delivers \"A Plea for Captain John Brown\" in Concord.","summary":"","details":["Summary: Thoreau publicly defended Brown in Concord while many newspapers treated him as criminal or insane. The speech reframed Brown as a principled antislavery martyr and forced Concord to argue over violence, conscience, and law.","Evidence: Fuller uses Thoreau's first Brown speech to show that the naturalist who reads Darwin most deeply is also a political radical responding to slavery. Brown therefore remains in the room, conceptually, when Thoreau turns to Origin.","Book anchor: Chapter 7 ties Thoreau's first Brown speech to his winter Darwin reading.","Web context: Plea, Thoreau, and raid sources corroborate the speech date and public abolitionist context."],"bookAnchors":[],"check":"web-confirmed; Fuller-confirmed for the family vote and local speech scene","sources":"Sources: F7; W-PleaJohnBrown, W-Thoreau, W-JohnBrownRaid.","start":{"year":1859,"month":10,"day":30,"value":1859.827397260274},"end":{"year":1859,"month":10,"day":30,"value":1859.827397260274},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Henry_David_Thoreau#Politics","display":"Wikipedia, Henry David Thoreau - politics","description":"Wikipedia, Henry David Thoreau.; nearest stable section: politics","kind":"web-anchor","sourceKey":"W-Thoreau"},{"href":"https://en.wikipedia.org/wiki/Henry_David_Thoreau#Biology","display":"Wikipedia, Henry David Thoreau - biology","description":"Wikipedia, Henry David Thoreau.; nearest stable section: biology","kind":"web-anchor","sourceKey":"W-Thoreau"},{"href":"https://en.wikipedia.org/wiki/Henry_David_Thoreau#Tuberculosis_and_death","display":"Wikipedia, Henry David Thoreau - tuberculosis and death","description":"Wikipedia, Henry David Thoreau.; nearest stable section: tuberculosis and death","kind":"web-anchor","sourceKey":"W-Thoreau"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Timeline_of_the_raid","display":"Wikipedia, John Brown's raid on Harpers Ferry - timeline of the raid","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: timeline of the raid","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Legacy","display":"Wikipedia, John Brown's raid on Harpers Ferry - legacy","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: legacy","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"}],"locationLinks":[]},{"id":"john-brown-9","chronologyId":"john-brown","dateLabel":"November 2, 1859","title":"Brown is sentenced to death in Virginia.","summary":"","details":["Summary: A Virginia court sentenced Brown to death after his conviction for treason, murder, and inciting enslaved people to rebel. The sentence began the final month in which Northern abolitionists transformed him into a martyr.","Evidence: The sentence begins the month in which Brown becomes, for many Northern antislavery readers, a martyr rather than merely a failed raider. Fuller uses this transformation to explain Concord's emotional temperature at the turn of 1860.","Web context: The raid and Brown biographies corroborate the trial outcome and December execution sequence."],"bookAnchors":[],"check":"web-confirmed","sources":"Sources: W-JohnBrownRaid, W-JohnBrown.","start":{"year":1859,"month":11,"day":2,"value":1859.835616438356},"end":{"year":1859,"month":11,"day":2,"value":1859.835616438356},"confidence":"exact","webAnchors":[{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Timeline_of_the_raid","display":"Wikipedia, John Brown's raid on Harpers Ferry - timeline of the raid","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: timeline of the raid","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Trial_and_execution","display":"Wikipedia, John Brown's raid on Harpers Ferry - trial and execution","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: trial and execution","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown%27s_raid_on_Harpers_Ferry#Legacy","display":"Wikipedia, John Brown's raid on Harpers Ferry - legacy","description":"Wikipedia, John Brown's raid on Harpers Ferry.; nearest stable section: legacy","kind":"web-anchor","sourceKey":"W-JohnBrownRaid"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Raid_at_Harpers_Ferry","display":"Wikipedia, John Brown (abolitionist) - raid at Harpers Ferry","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: raid at Harpers Ferry","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Trial","display":"Wikipedia, John Brown (abolitionist) - trial","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: trial","kind":"web-anchor","sourceKey":"W-JohnBrown"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Last_words.2C_death_and_aftermath","display":"Wikipedia, John Brown (abolitionist) - death and aftermath","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: death and aftermath","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationLinks":[]},{"id":"john-brown-10","chronologyId":"john-brown","dateLabel":"November 1859","title":"Thoreau repeats \"A Plea for Captain John Brown\" in Boston and Worcester.","summary":"","details":["Summary: Thoreau carried his defense of Brown beyond Concord to Boston and Worcester. Repeating the speech broadened the counter-narrative that Brown should be judged by antislavery conscience rather than by Virginia law alone.","Evidence: The repeated speeches matter because Brown's defense moves beyond Concord before the execution. Fuller treats this sequence as part of the shift by which Brown becomes a martyr for Northern abolitionists.","Book anchor: Chapter 7 follows the speech from Concord to Boston and Worcester.","Web context: Plea and Thoreau sources corroborate the pre-execution repetition of the speech."],"bookAnchors":[],"check":"web-confirmed context; Fuller-confirmed for Boston/Worcester sequence","sources":"Sources: F7; W-PleaJohnBrown, W-Thoreau, W-JohnBrown.","start":{"year":1859,"month":11,"day":15,"value":1859.8712328767124},"end":{"year":1859,"month":11,"day":15,"value":1859.8712328767124},"confidence":"month","webAnchors":[{"href":"https://en.wikipedia.org/wiki/Henry_David_Thoreau#Politics","display":"Wikipedia, Henry David Thoreau - politics","description":"Wikipedia, Henry David Thoreau.; nearest stable section: politics","kind":"web-anchor","sourceKey":"W-Thoreau"},{"href":"https://en.wikipedia.org/wiki/John_Brown_(abolitionist)#Last_words.2C_death_and_aftermath","display":"Wikipedia, John Brown (abolitionist) - death and aftermath","description":"Wikipedia, John Brown (abolitionist).; nearest stable section: death and aftermath","kind":"web-anchor","sourceKey":"W-JohnBrown"}],"locationL
